<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundo Virtual & 3D Studio</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="background-overlay"></div>
<header>
<div class="logo">VIRTUAL<span>3D</span></div>
<nav>
<ul>
<li><a href="#roleplay">Roleplay</a></li>
<li><a href="#tienda">Catálogo 3D</a></li>
</ul>
</nav>
</header>
<main>
<section id="roleplay" class="hero-section">
<div class="glass-card">
<h2>Crea tu nueva vida</h2>
<p>Explora un mundo sin límites desde tu navegador.</p>
<div id="game-preview">
<div class="stats">
<div class="stat-item">🔋 100%</div>
<div class="stat-item">💰 $1,250</div>
</div>
</div>
<button class="btn-main">COMENZAR AVENTURA</button>
</div>
</section>
<section id="tienda">
<h2 class="section-title">Impresiones Destacadas</h2>
<div class="product-grid">
<div class="product-card">
<div class="img-container">
<span class="badge">Nuevo</span>
<div class="placeholder-3d">🐉</div>
</div>
<h3>Dragón Articulado</h3>
<p class="price">$15.99</p>
<button class="btn-shop">Añadir al Carrito</button>
</div>
<div class="product-card">
<div class="img-container">
<div class="placeholder-3d">🎧</div>
</div>
<h3>Soporte Cyberpunk</h3>
<p class="price">$22.50</p>
<button class="btn-shop">Añadir al Carrito</button>
</div>
</div>
</section>
</main>
</body>
</html>
